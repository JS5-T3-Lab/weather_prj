<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Scanner</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/travel.css" />
  </head>

  <body>
    <!-- ===== 상단 내비게이션 (기존 코드 100% 유지) ===== -->
    <nav class="top-nav">
      <div class="nav-container">
        <a href="index.html" class="logo">
          <div class="logo-icon"><i class="fa-solid fa-cloud-sun"></i></div>
          <span>Weather Scanner</span>
        </a>
        <div class="desktop-menu">
          <a href="index.html" class="nav-link"
            ><i class="fa-solid fa-house"></i> 홈</a
          >
          <a href="map.html" class="nav-link"
            ><i class="fa-solid fa-map-location-dot"></i> 날씨지도</a
          >
          <a href="travel.html" class="nav-link"
            ><i class="fa-solid fa-plane"></i> 여행날씨</a
          >
          <a href="outfit.html" class="nav-link"
            ><i class="fa-solid fa-shirt"></i> 옷차림 추천</a
          >
        </div>
      </div>
    </nav>

    <!-- ===== 메인 레이아웃 ===== -->
    <div class="travel-wrapper container-fluid">
      <div class="row g-3">
        <!-- 왼쪽 사이드바 -->
        <aside class="col-12 col-md-2">
          <!-- 활동 선택 카드 -->
          <div class="card travel-card mb-3">
            <div class="card-header sky">무엇을 할 계획이신가요?</div>
            <div class="card-body">
              <p class="card-hint">원하는 활동 선택입력.</p>
              <div class="form-group">
                <label class="label" for="activity-select">Activity</label>
                <select
                  id="activity-select"
                  class="input form-select form-select-sm"
                >
                  <option value="">활동을 선택하세요</option>
                  <option value="Fishing">🎣 낚시</option>
                  <option value="Hiking">🥾 등산 / 트레킹</option>
                  <option value="Running">🏃 조깅 / 러닝</option>
                  <option value="Cycling">🚴 자전거 라이딩</option>
                  <option value="Swimming">🏊 야외수영 / 해수욕</option>
                  <option value="Camping">⛺ 캠핑 / 피크닉</option>
                  <option value="Golf">⛳ 골프</option>
                  <option value="OutdoorSports">
                    ⚽ 야외 구기 (축구·배구 등)
                  </option>
                  <option value="DogWalk">🐾 반려견 산책</option>
                  <option value="Photography">📷 야외 사진촬영</option>
                </select>
              </div>
            </div>
          </div>

          <!-- 목적지 선택 카드 -->
          <div class="card travel-card">
            <div class="card-header sky">어디로 갈 계획이신가요?</div>
            <div class="card-body">
              <p class="card-hint">원하는 여행지 선택입력</p>
              <div class="form-group">
                <label class="label" for="destination-select"
                  >Destination</label
                >
                <!-- ✅ 도시 목록은 travel.js의 CITY_LIST 배열에서 동적으로 채워짐 -->
                <select
                  id="destination-select"
                  class="input form-select form-select-sm"
                >
                  <option value="">도시를 선택하세요</option>
                </select>
              </div>
            </div>
          </div>
        </aside>

        <!-- 메인 컨텐츠 -->
        <main class="col-12 col-md-8">
          <h2 class="page-title">여행중 날씨를 알려드립니다</h2>

          <form id="search-form" class="form">
            <div class="card travel-card mb-3">
              <div class="card-header sky">알고싶은 기간을 입력하세요</div>
              <div class="card-body date-selector">
                <div class="row g-2 align-items-end">
                  <div class="col-6 col-md-4">
                    <label class="label" for="checkin-input">Check-in</label>
                    <input
                      id="checkin-input"
                      class="input form-control form-control-sm"
                      type="date"
                    />
                  </div>
                  <div class="col-6 col-md-4">
                    <label class="label" for="checkout-input">Check-out</label>
                    <input
                      id="checkout-input"
                      class="input form-control form-control-sm"
                      type="date"
                    />
                  </div>
                  <div class="col-12 col-md-4 d-flex gap-2">
                    <button
                      id="submit-btn"
                      class="btn primary flex-fill"
                      type="submit"
                    >
                      Search
                    </button>
                    <button
                      id="reset-btn"
                      class="btn ghost flex-fill"
                      type="button"
                    >
                      Reset
                    </button>
                  </div>
                </div>
              </div>
            </div>
            <div
              id="message-area"
              class="message-area"
              aria-live="polite"
            ></div>
          </form>

          <!-- 결과 캘린더 -->
          <div class="card travel-card">
            <div class="card-header sunset">여행기간중 날씨 캘린더</div>
            <div class="card-body">
              <div id="result-meta" class="result-meta"></div>
              <div id="loading" class="loading d-none">Loading forecast...</div>
              <div id="results" class="results"></div>
            </div>
          </div>
        </main>

        <!-- 오른쪽 사이드바 -->
        <aside class="col-12 col-md-2">
          <div class="card travel-card">
            <div class="card-header sunset">활동별 날씨 안내</div>
            <div class="card-body" id="activity-tips">
              <p class="card-hint">
                활동을 선택하면 맞춤 날씨 안내가 표시됩니다.
              </p>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <!-- ===== 하단 모바일 내비 (기존 코드 유지) ===== -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-link"
        ><i class="fa-solid fa-house"></i>홈</a
      >
      <a href="map.html" class="nav-link"
        ><i class="fa-solid fa-map-location-dot"></i>지도</a
      >
      <a href="travel.html" class="nav-link"
        ><i class="fa-solid fa-plane"></i>여행</a
      >
      <a href="outfit.html" class="nav-link"
        ><i class="fa-solid fa-shirt"></i>옷차림</a
      >
    </nav>

    <!-- ===== 3시간 예보 모달 ===== -->
    <div
      id="hourly-modal"
      class="modal fade"
      tabindex="-1"
      role="dialog"
      aria-labelledby="modal-title"
      aria-modal="true"
    >
      <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header sky">
            <div>
              <h5 id="modal-title" class="modal-title mb-0">3시간 예보 상세</h5>
              <small id="modal-subtitle" class="opacity-75"></small>
            </div>
            <button
              id="modal-close"
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p class="modal-hint">
              3시간 단위 예보 데이터 <b>(/data/2.5/forecast)</b> 기준입니다.
            </p>
            <div id="hourly-list" class="table-responsive"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== 스크립트 로드 순서 ===== -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/travel.js"></script>

    <script>
      document.querySelectorAll(".nav-link").forEach((link) => {
        if (link.getAttribute("href") === "travel.html") {
          link.classList.add("active");
        }
      });
    </script>
  </body>
</html>
